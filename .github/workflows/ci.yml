name: CI

on:
  push:
    branches: [main, master, v4.1-character-reality]
  pull_request:
  workflow_call:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: v2/requirements.txt

      - name: Install dependencies
        run: pip install -r v2/requirements.txt

      - name: Run pytest with coverage
        working-directory: v2/backend
        run: python -m pytest tests/ -v --tb=short

  v3-db:
    name: V3 db module tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run V3 db tests
        working-directory: v3
        run: pip install pytest && python -m pytest tests/ -v --tb=short

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: v2/frontend/package-lock.json

      - name: Install and build
        working-directory: v2/frontend
        run: |
          npm ci
          npm run build
