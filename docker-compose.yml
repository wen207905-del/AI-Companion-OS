# AI-Companion-OS V2 — 聊天前端 + 后端 API
services:

  api:
    build:
      context: .
      dockerfile: v2/backend/Dockerfile
    container_name: ai_companion_v2_api
    restart: always
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - RESET_WORLD_ON_START=${RESET_WORLD_ON_START:-false}
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-}
      - QWEN_MODEL=${QWEN_MODEL:-}
      - LLM_PROVIDER=${LLM_PROVIDER:-deepseek}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - LLM_AUX_PROVIDER=${LLM_AUX_PROVIDER:-deepseek}
      - LLM_AUX_MODEL=${LLM_AUX_MODEL:-deepseek-chat}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.85}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-512}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-120}
      - LLM_STREAM=${LLM_STREAM:-true}
      - LLM_INNER_THOUGHT=${LLM_INNER_THOUGHT:-false}
      - STYLE_REFERENCE_ENABLED=${STYLE_REFERENCE_ENABLED:-false}
      - ENABLE_MANUAL_MODE=${ENABLE_MANUAL_MODE:-false}
      - PRIVATE_SKIP_EXPAND=${PRIVATE_SKIP_EXPAND:-true}
      - GROUP_SKIP_EXPAND=${GROUP_SKIP_EXPAND:-true}
      - GROUP_MAX_RESPONDERS=${GROUP_MAX_RESPONDERS:-1}
      - GROUP_CHAIN_ENABLED=${GROUP_CHAIN_ENABLED:-false}
      - GROUP_PRIVATE_BRIDGE_ENABLED=${GROUP_PRIVATE_BRIDGE_ENABLED:-false}
      - GROUP_PRIVATE_MEMORY_IN_PROMPT=${GROUP_PRIVATE_MEMORY_IN_PROMPT:-false}
      - GROUP_PRIVATE_CONTINUITY_ENABLED=${GROUP_PRIVATE_CONTINUITY_ENABLED:-true}
      - GROUP_MAX_REPLY_CHARS=${GROUP_MAX_REPLY_CHARS:-450}
      - GROUP_MAX_TOKENS=${GROUP_MAX_TOKENS:-700}
      - GROUP_TEMPERATURE=${GROUP_TEMPERATURE:-0.75}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-}
      - CONTENT_MODE=${CONTENT_MODE:-unrestricted}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY:-}
      - SILICONFLOW_BASE_URL=${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}
      - IMAGE_CONTENT_MODE=${IMAGE_CONTENT_MODE:-unrestricted}
      - IMAGE_OUTPUT_DIR=/app/data/albums
      - TZ=Asia/Shanghai
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: v2/frontend
      dockerfile: Dockerfile
    container_name: ai_companion_web
    restart: always
    ports:
      - "${WEB_PORT:-80}:80"
    depends_on:
      api:
        condition: service_healthy
