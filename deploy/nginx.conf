# AI-Companion-OS Nginx 反向代理配置
#
# 路由规则：
#   /      → 前端静态文件
#   /api   → FastAPI 后端 (127.0.0.1:8000)
#   /ws    → WebSocket (127.0.0.1:8000)
#
# 部署步骤：
#   1. 复制到 /etc/nginx/sites-available/ai-companion
#   2. ln -s /etc/nginx/sites-available/ai-companion /etc/nginx/sites-enabled/
#   3. nginx -t && systemctl reload nginx

upstream fastapi_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # 替换为你的域名，如 example.com

    # 日志
    access_log /var/log/nginx/ai-companion-access.log;
    error_log  /var/log/nginx/ai-companion-error.log;

    # 上传限制
    client_max_body_size 20M;

    # ── 前端静态文件 ──
    location / {
        root   /opt/ai-companion/frontend/dist;
        index  index.html;
        try_files $uri $uri/ /index.html;

        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API 反向代理 ──
    location /api {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    # ── WebSocket ──
    location /ws {
        proxy_pass http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── 健康检查（不记录日志） ──
    location /health {
        proxy_pass http://fastapi_backend;
        access_log off;
    }
}

