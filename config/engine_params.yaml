    - { time: "08:10", activity: "通勤/个人事务", duration_min: 50 }
    - { time: "09:00", activity: "工作/日常事务", duration_min: 150 }
    - { time: "11:30", activity: "午间休息", duration_min: 60 }
    - { time: "12:30", activity: "午餐", duration_min: 40 }
    - { time: "13:10", activity: "下午工作/事务", duration_min: 170 }
    - { time: "16:00", activity: "下午茶/短暂休息", duration_min: 30 }
    - { time: "16:30", activity: "收尾工作", duration_min: 60 }
    - { time: "17:30", activity: "下班/通勤", duration_min: 50 }
    - { time: "18:20", activity: "晚餐准备/晚餐", duration_min: 70 }
