# AI-Companion-OS 引擎参数配置
# 所有引擎的可调参数，使用默认推荐值

# ============================================================
# 关系引擎参数
# ============================================================
relationship_engine:
  # 维度定义
  dimensions:
    love:
      name: 爱意
      range: [0, 100]
      initial: 10
      description: 对伴侣的情感深度，包含关心、依恋、爱的程度
    trust:
      name: 信任
      range: [0, 100]
      initial: 15
      description: 对伴侣可靠性和诚实的信心
    dependence:
      name: 依赖度
      range: [0, 100]
      initial: 5
      description: 情感和生活上对伴侣的依赖程度
    respect:
      name: 尊重
      range: [0, 100]
      initial: 20
      description: 对伴侣品格和能力的尊重程度
    jealousy:
      name: 嫉妒值
      range: [0, 100]
      initial: 5
      description: 对潜在情感威胁的敏感度和反应强度
    security:
      name: 安全感
      range: [0, 100]
      initial: 30
      description: 在关系中感受到的安全和稳定程度

  # 维度间相互影响矩阵（行影响列的变化量）
  interaction_matrix:
    trust_to_security: 0.3       # 信任每变化1点，安全感同向变化0.3
    love_to_jealousy: 0.25       # 爱意每增加1点，嫉妒值增加0.25
    dependence_to_security: -0.2 # 依赖每增加1点，安全感减少0.2
    jealousy_to_love: -0.15      # 嫉妒每增加1点，爱意减少0.15
    security_to_love: 0.2        # 安全感每增加1点，爱意增加0.2
    respect_to_love: 0.15        # 尊重每增加1点，爱意增加0.15
    trust_to_dependence: 0.1     # 信任每增加1点，依赖减少0.1

  # 关系阶段判定阈值
  stages:
    stranger:     { min_love: 0,  max_love: 19 }
    acquaintance: { min_love: 20, max_love: 34 }
    friend:       { min_love: 35, max_love: 49 }
    ambiguous:    { min_love: 50, max_love: 64 }
    passionate:   { min_love: 65, max_love: 79 }
    stable:       { min_love: 80, max_love: 89 }
    partner:      { min_love: 90, max_love: 97 }
    soulmate:     { min_love: 98, max_love: 100 }

  # 每日被动衰减系数（不互动时的自然衰减）
  daily_decay:
    love: 0.05
    trust: 0.02
    dependence: 0.08
    respect: 0.01
    jealousy: 0.15
    security: 0.05

  # 冲突后恢复速率（冲突解决后每日恢复量）
  conflict_recovery:
    love: 0.8
    trust: 0.3
    security: 0.5

# ============================================================
# 情绪引擎参数
# ============================================================
emotion_engine:
  base_emotions:
    happy:   { name: 开心, range: [0, 100], initial: 60 }
    sad:     { name: 悲伤, range: [0, 100], initial: 5 }
    fear:    { name: 恐惧, range: [0, 100], initial: 5 }
    angry:   { name: 生气, range: [0, 100], initial: 0 }
    jealous: { name: 嫉妒, range: [0, 100], initial: 0 }
    tired:   { name: 疲惫, range: [0, 100], initial: 10 }
    excited: { name: 兴奋, range: [0, 100], initial: 20 }
    lonely:  { name: 孤独, range: [0, 100], initial: 15 }
    calm:    { name: 平静, range: [0, 100], initial: 70 }

  # 情绪衰减速率（每 tick 衰减量，值越大衰减越快）
  decay_rates:
    happy: 0.03
    sad: 0.02
    fear: 0.04
    angry: 0.015        # 生气衰减最慢
    jealous: 0.02
    tired: 0.08         # 疲惫衰减快（休息即可恢复）
    excited: 0.06       # 兴奋衰减较快
    lonely: 0.01        # 孤独衰减极慢
    calm: 0.01          # 平静最稳定

  # 情绪混合规则
  # 当两种情绪共存时，按以下权重计算主导情绪
  mix_weights:
    sad_angry_weight: { sad: 0.55, angry: 0.45 }
    sad_lonely_weight: { sad: 0.7, lonely: 0.3 }
    happy_excited_weight: { happy: 0.4, excited: 0.6 }
    angry_jealous_weight: { angry: 0.4, jealous: 0.6 }
    fear_sad_weight: { fear: 0.6, sad: 0.4 }

  # 五阶段情绪持久性模型（各阶段持续时间，单位：tick）
  persistence:
    burst: 1        # 爆发：立即触发
    peak: 3         # 高峰：持续3 tick
    ease: 8         # 缓和：持续8 tick（开始自然衰减）
    observe: 12     # 观察：持续12 tick（对外界互动敏感）
    recovery: 20    # 恢复：持续20 tick（逐渐回归基线）
    # 总周期约44 tick，后续仍会继续衰减

  # 情绪触发阈值
  triggers:
    jeal_trigger_from_relationship: 30   # 关系中的嫉妒维度超过30触发情绪嫉妒
    lonely_trigger_from_dependence: 40   # 依赖度超过40触发孤独情绪
    fear_trigger_from_security: 25       # 安全感低于25触发恐惧情绪

