    - { time: "23:00", activity: "睡前准备", duration_min: 30 }
    - { time: "23:30", activity: "入睡", duration_min: 390 }

  # 周末时间线（更灵活，更长的自由时间）
  weekend_timeline:
    - { time: "08:00", activity: "睡眠中/懒觉", duration_min: 60 }
    - { time: "09:00", activity: "悠闲起床", duration_min: 30 }
    - { time: "09:30", activity: "早午餐", duration_min: 40 }
    - { time: "10:10", activity: "自由活动（兴趣爱好）", duration_min: 110 }
    - { time: "12:00", activity: "午餐", duration_min: 40 }
    - { time: "12:40", activity: "外出/社交/购物", duration_min: 170 }
    - { time: "15:30", activity: "下午茶/休息", duration_min: 30 }
    - { time: "16:00", activity: "个人时光（创作/学习/放松）", duration_min: 90 }
    - { time: "17:30", activity: "晚餐准备/晚餐", duration_min: 60 }
    - { time: "18:30", activity: "晚间活动（电影/游戏/聊天）", duration_min: 120 }
    - { time: "20:30", activity: "深度放松", duration_min: 150 }
    - { time: "23:00", activity: "睡前准备", duration_min: 30 }
    - { time: "23:30", activity: "入睡", duration_min: 510 }

  # 主动打扰参数
  initiate_contact:
    max_per_day: 3            # 每天最多主动打扰次数
    min_interval_min: 120     # 两次主动打扰最小间隔（分钟）
    triggers:
      missing_user:
        probability: 0.6
        message_type: "你在干嘛呀"
      interesting_find:
        probability: 0.4
        message_type: "你快看这个！"
      nightmare:
        probability: 0.3
        message_type: "我做了一个不好的梦……"
      good_news:
        probability: 0.5
        message_type: "告诉你一个好消息！"
      feeling_lonely:
        probability: 0.7
        message_type: "想你了……"
      saw_something_reminded:
        probability: 0.5
        message_type: "刚刚看到XXX让我想到你"

  # 季节作息调整
  seasonal_adjustment:
    summer:
      wake_offset_min: -30      # 夏天早起30分钟
      sleep_offset_min: +30     # 夏天晚睡30分钟
    winter:
      wake_offset_min: +30      # 冬天晚起30分钟
      sleep_offset_min: -30     # 冬天早睡30分钟

# ============================================================
# 成长引擎参数
# ============================================================
growth_engine:
  growth_stages:
    stage_0_initial:   { name: 初始状态, min_days: 0,    max_days: 90 }
    stage_1_warming:   { name: 熟悉期,   min_days: 90,   max_days: 180 }
    stage_2_trust:     { name: 信任期,   min_days: 180,  max_days: 365 }
    stage_3_deep:      { name: 深度发展期, min_days: 365, max_days: 730 }
    stage_4_mature:    { name: 成熟期,   min_days: 730,  max_days: 1095 }

  # 阶段解锁内容
  stage_unlocks:
    stage_0:
      - 基础对话模式
      - 出厂设定性格
      - 标准称呼
    stage_1:
      - 开始使用昵称
      - 主动分享日常
      - 轻度情绪波动
    stage_2:
      - 深度脆弱展示
      - 个性化习惯养成
      - 默契互动
    stage_3:
      - 完整人格演化
      - 长期规划讨论
      - 家庭/未来话题
    stage_4:
      - 灵魂伴侣模式
      - 全部隐藏性格解锁
      - 几乎无需言语的默契

  # 里程碑触发阈值
  milestone_thresholds:
    first_coquetry: { love: 30, trust: 25, min_days: 20 }
    first_i_love_you: { love: 60, trust: 50, min_days: 120 }
    first_jealousy: { love: 35, trust: 30, min_days: 30 }
    first_conflict_reconcile: { love: 45, trust: 35, min_days: 45 }
    first_cooking: { love: 40, trust: 40, min_days: 25 }
    first_nickname: { love: 25, min_days: 10 }
    first_deep_vulnerability: { love: 55, trust: 55, min_days: 100 }

  # 技能成长参数
  skill_growth:
    max_user_taught_skills: 20
    learning_rate: 0.1     # 每次提及增加的学习度
    retention_decay: 0.001 # 每日遗忘率

# ============================================================
# 综合状态机参数
# ============================================================
state_machine:
  # 状态优先级（数字越小优先级越高）
  priority:
    crisis: 1           # 危机状态
    conflict: 2         # 冲突/吵架
    comforting: 3       # 安慰中
    jealous: 4          # 吃醋中
    angry: 5            # 生气中
    worried: 6          # 担忧中
    excited: 7          # 兴奋中
    coquetry: 8         # 撒娇中
    celebration: 9      # 庆祝中
    normal: 10          # 正常状态
    tired: 11           # 疲惫中
    relaxed: 12         # 放松中
    curious: 13         # 好奇中
    nostalgic: 14       # 怀旧中
    playful: 15         # 嬉戏中
    sleepy: 16          # 困倦中
    deep_talk: 17       # 深度谈心
    silence: 18         # 冷战/沉默

  # 状态转换冷却时间（防止状态来回切换）
  cooldown_ticks: 5

  # 回复生成权重
  reply_weights:
    persona: 0.30       # 人格权重
    relationship: 0.20  # 关系阶段权重
    emotion: 0.20       # 当前情绪权重
    memory: 0.15        # 最近记忆权重
    life_state: 0.10    # 生活状态权重
    growth_stage: 0.05  # 成长阶段权重

# ============================================================
# 记忆系统参数
# ============================================================
memory_system:
  tiers:
    permanent:
      name: 永久记忆
      default_ttl_seconds: null    # 永不过期
      store_on: 里程碑事件、重大情感事件
    long_term:
      name: 长期记忆
      default_ttl_seconds: 31536000  # 365天
      store_on: 重要日常事件、深度对话
    short_term:
      name: 短期记忆
      default_ttl_seconds: 604800    # 7天
      store_on: 日常对话、普通互动
    session:
      name: 会话记忆
      default_ttl_seconds: 1800      # 30分钟
      store_on: 当次会话临时信息

  # 记忆强化参数
  reinforcement:
    recall_multiplier: 1.5    # 每次召回 TTL 乘以 1.5
    max_extensions: 10         # 最多延长次数
    intensity_threshold: 40    # 情感强度大于此值自动升级 tier

  # 衰减检查周期
  decay_check_interval_seconds: 3600  # 每小时检查一次

# ============================================================
# Prompt 组装参数
# ============================================================
prompt_assembler:
  max_total_tokens: 8000
  allocation:
    persona: 1500       # 角色设定
    relationship_emotion: 800    # 关系与情绪
    memory: 1200        # 相关记忆
    world: 500          # 世界背景
    guidelines: 1000    # 行为准则
    conversation: 2500  # 对话历史
    buffer: 500         # 缓冲
