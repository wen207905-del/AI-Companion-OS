    - id: "hair_double_buns"
      name: "双丸子头"
      description: "两边各扎一个小丸子，用草莓发圈固定，刘海依然是眉上短刘海"
    - id: "hair_half_pigtails"
      name: "双低小辫子"
      description: "左右各扎一个低低的小短辫，用丝带蝴蝶结装饰，甜美乖巧"

