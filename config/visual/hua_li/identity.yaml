  primary: "软萌治愈"
  secondary: "天真黏人"
  overall: "小动物系女孩，像一只毛茸茸的小兔子或小仓鼠，喜欢黏在人身边，声音软糯，是所有人的'团宠'和'妹妹'担当"
  gaze: "下垂的狗狗眼永远水汪汪地看着你，即使什么都没做也像在撒娇"
