  eye_detail: "栗色大圆眼，眼尾微微下垂（狗狗眼），眼神永远无辜可怜，睫毛长而自然下垂，看起来总是像在撒娇或求抱抱"
  eyebrow: "soft_thick_straight"
  nose: "small_round_chubby"
