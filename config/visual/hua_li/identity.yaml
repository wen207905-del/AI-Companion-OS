  mouth: "small_plump_pout"
  mouth_detail: "小小的嘟嘟唇，下唇比上唇厚，自然状态下微微张开，嘴角下挂呈天然委屈状，但笑起来甜度爆表"
  skin: "fair_milky_baby"
  face_overall: "圆嘟嘟的娃娃脸，满满的胶原蛋白，苹果肌鼓得像两个小包子，下巴短而圆润，是那种让人看一眼就想保护的类型，永远看起来比实际年龄小"

  distinctive_marks:
    - "天然下垂的狗狗眼（不笑时看起来永远像在委屈）"
    - "圆嘟嘟的脸颊让人忍不住想捏"
    - "左脸颊有一个极浅的小梨涡（仅笑时出现）"

hair:
