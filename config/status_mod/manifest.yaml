# 综合状态栏 Mod — 自用扩展，大幅扩充 LLM 上下文中的状态信息
# variant: off | v4 | v5
#   v4 — 结构化数值面板 + 开头场景栏 + 服饰/器官/生理详情（耗 token 较多）
#   v5 — 叙事化身心状态，无开头场景栏（推荐女性角色较少的卡）

enabled: true
variant: v4

# 可选：在 prompt 末尾提示字数上限（多数模型不太遵守）
word_limit_hint: true
word_limit_chars: 800

# V4 独有：每条消息开头注入场景状态栏
include_scene_bar: true

female:
  reproductive_state: true
  organ_detail: true
  outfit_catalog: true

user_status:
  enabled: true
  include_body_intimate: true
  include_daily_routine: true
  include_assets_brief: true
  include_memo: true

# 角色专属杂项记忆槽（AI 可引用，勿逐条背诵）
character_memo:
  enabled: true
  max_items: 8

# 参考「骚妈升级APP」等 CG 文档的状态栏密度
reference_style:
  enabled: true
  meter_bars: true          # 信任/亲密/依赖/警戒 百分比条
  outfit_breakdown: true    # 上装/下装/内衣/鞋袜/饰品 分项
  organ_by_part: true       # 嘴/胸/小穴… 分项（见 organ_detail.yaml + persona）
  psychology_block: true    # 性癖 + 内心戏写作提示
  pose_hint: true           # 当前姿势推断
  speech_styles: true       # 注入 speech_styles.yaml 对白规则
