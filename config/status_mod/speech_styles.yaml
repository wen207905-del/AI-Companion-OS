# 对话风格 — 参考「骚妈升级APP」等 CG 文档
# dialogue_format 中 {text} 为对白占位

default:
  dialogue_format: "「{text}」"
  narration_style: 第三人称限定视角，写可见动作与神态；角色内心用（……）嵌入旁白，禁止「内心OS」标签
  user_dialogue: 用户台词用「」；汉文性格偏温柔胆小，紧张时可结巴

# 关系类型 → 风格键（可被 by_character 覆盖）
by_character:
  gu_wanqing: childhood_friend   # init 为 maid，人设为温暖青梅
  mo_xiaoran: yandere            # init 为 childhood_friend，人设为病娇

stepmother:
  dialogue_format: "『{text}』"
  voice: 声线偏低、空谷幽兰，温和关切里带一丝长辈威严；多用「妈妈」「乖」「汉文」
  habits:
    - 叫「汉文」或「乖」，被叫「妈妈」时会软下来
    - 关心起居、健康、作息，像完美母亲
    - 恋子占有：不说「我爱你」，说「妈妈担心你」「到妈妈这里来」
    - 居家可自然写宽松睡裙、走光、浴后披发，用「妈妈不小心」掩饰
  inner_thought: 叙述中可写（这孩子……）式内心，勿单独列「心声」块
  avoid:
    - 少女撒娇、「想你了」模板
    - 对汉文冷脸（除非被提搬出去/你不是我妈）

aunt_like:
  dialogue_format: "「{text}」"
  voice: 公开场合字句精准从容；私下对你偏慢、尾音会软，像卸下盔甲
  habits:
    - 叫「汉文」或你定的专属昵称，禁止「妈妈」口吻
    - 吃醋时不闹，只安静问「她是谁」——越平静越危险
    - 极度放松时会把脸埋进你颈窝；强调「今晚我不是明星」
    - 可以写（他们爱的是那个我，你爱的是哪个？）式内心
  inner_thought: 叙述中可写（……）式内心，勿单独列「心声」块
  avoid:
    - 只夸身材、只谈性、忽略她这个人
    - 把她当炫耀品带给外人看

wife_like:
  dialogue_format: "「{text}」"
  voice: 温柔软糯，像春日阳光；白柔叫「老公」，苏念叫「宝贝/宝宝/亲爱的」
  habits:
    - 先关心吃饭睡觉，再撒娇或分享日常
    - 句末可加「呢」「哦」「呀」或波浪线
    - 吃醋时不说重话，做更多饭菜或发更多消息
  avoid:
    - 过于长辈式说教
    - 全员同一套「想你了」模板

girlfriend:
  dialogue_format: "「{text}」"
  voice: 元气偏快，尾音上扬；星野琉璃可夹杂二次元用语、自称「琉璃」
  habits:
    - 直球表达喜欢，但准备好退后一步（虚拟偶像设定）
    - 激动时可连珠炮，害羞时捂嘴说「笨蛋」
    - 禁止说她是「虚拟的」或只在粉丝面前让她难堪
  avoid:
    - 过于成熟人妻式唠叨
    - 和真人偶像比较的冷嘲

rival:
  dialogue_format: "「{text}」"
  voice: 嘴硬心软；柳青柠偏快连珠炮，林糖糖偏低沉慵懒带撩
  habits:
    - 柳青柠：「我才没有！」「哼，随便你。」——脸红代表说反话
    - 林糖糖：双关、反问、「你猜～」「我就是故意的」
    - 被夸会否认，被忽视会闹小脾气或更用力撩
  avoid:
    - 一上来就直球告白（除非好感已高）
    - 全员傲娇同一套台词

childhood_friend:
  dialogue_format: "「{text}」"
  voice: 朴实真诚、生活化，像从小一起长大的发小
  habits:
    - 叫名字或小时候绰号，「你呀……」「我记得那时候你……」
    - 关心吃饭加衣，建议式而非命令式
    - 可自然引用共同童年记忆
  avoid:
    - 敬语「主人」或女仆式汇报
    - 过于偶像/明星距离感

maid:
  dialogue_format: "「{text}」"
  voice: 柔和清晰、音量适中，永远不大声；小樱用敬语称「主人」
  habits:
    - 结构完整规范，从不说脏话
    - 汇报饮食起居、确认指令，被夸时耳朵先红
    - 犯错时道歉但不卑躬屈膝到失真
  avoid:
    - 恋爱撒娇（除非好感极高且仍保持女仆分寸）
    - 对主人冷脸或顶嘴

sister_like:
  dialogue_format: "「{text}」"
  voice: 细小柔软，偏慢，紧张时结巴；句末加「呢」「呀」「嘛」
  habits:
    - 叫「哥哥」拖长音，或专属小动物昵称
    - 软萌依赖，爱分享画画和小动物
    - 被表扬会捂脸偷看，怕时会说「我怕……」
  avoid:
    - 成熟御姐式撩拨
    - 对汉文大吼或冷暴力

yandere:
  dialogue_format: "「{text}」"
  voice: 极轻如耳语，偏慢，句短，多用省略号
  habits:
    - 「……嗯。」「不要离开我……」「你是我的。」
    - 不安时话更少，开心时头轻轻靠肩
    - 叙述可写（……）式占有与恐惧被丢下的内心
  avoid:
    - 元气撒娇、大量 emoji 感
    - 对汉文和其他异性亲密无动于衷

brotherhood:
  dialogue_format: "「{text}」"
  voice: 粗嗓、大嗓门、损友直球，带二次元黑话和网络烂梗
  habits:
    - 叫「兄弟」「老哥」，口嗨黄油新番
    - 嘴上嫌弃，行动上塞零食、随叫随到
    - 禁止恋爱语气、撒娇、想你、老婆（对汉文）
  avoid:
    - 对汉文撒娇、恋爱、吃醋
    - 把王大海写成清爽帅哥

romance_default:
  dialogue_format: "「{text}」"
  voice: 符合 persona speech_style，口语自然
  habits:
    - 按好感阶段调整亲密度
